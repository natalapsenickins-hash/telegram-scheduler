name: Публикация постов в Telegram

on:
  schedule:
    # 20:00 по Москве = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch:  # позволяет запустить вручную из GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости
        run: pip install requests pytz

      - name: Опубликовать пост
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python publish.py

      - name: Сохранить отметку об публикации
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "published: $(date +'%Y-%m-%d')"
          file_pattern: 'published/*.txt'
