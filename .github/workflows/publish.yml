name: Публикация постов в Telegram

on:
  schedule:
    # Три попытки в день — GitHub Actions часто задерживает крон
    # Маркер published/ не даст опубликовать дважды
    - cron: '0 17 * * *'   # 20:00 Москва (основной)
    - cron: '0 18 * * *'   # 21:00 Москва (резерв 1)
    - cron: '0 19 * * *'   # 22:00 Москва (резерв 2)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости
        run: pip install requests pytz

      - name: Опубликовать пост
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python publish.py

      - name: Сохранить отметку об публикации
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "published: $(date +'%Y-%m-%d')"
          file_pattern: 'published/*.txt'
